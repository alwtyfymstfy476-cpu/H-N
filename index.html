<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>H&amp;N Anatomy | Mission: Neural Nexus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', system-ui, 'Inter', 'Cairo', sans-serif;
            color: #eef5ff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* animated mesh / grid background (different from galaxy) */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0, 180, 255, 0.08) 0px, rgba(0, 180, 255, 0.08) 1px, transparent 1px, transparent 80px),
                repeating-linear-gradient(90deg, rgba(0, 220, 255, 0.06) 0px, rgba(0, 220, 255, 0.06) 1px, transparent 1px, transparent 80px);
            background-size: 80px 80px;
            animation: meshSlide 28s linear infinite;
            opacity: 0.4;
        }

        @keyframes meshSlide {
            0% { background-position: 0 0; }
            100% { background-position: 80px 80px; }
        }

        .gradient-orb {
            position: fixed;
            top: -30vh;
            right: -20vw;
            width: 90vw;
            height: 90vw;
            background: radial-gradient(circle, rgba(0, 160, 255, 0.2), rgba(10, 30, 60, 0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }

        .gradient-orb-bottom {
            bottom: -30vh;
            left: -20vw;
            top: auto;
            background: radial-gradient(circle, rgba(100, 0, 255, 0.18), rgba(0, 0, 0, 0) 70%);
        }

        /* header section with futuristic glitch */
        .hero {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 1rem;
            position: relative;
        }

        .badge-neon {
            font-family: monospace;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: #5bc0ff;
            background: rgba(0, 50, 80, 0.5);
            backdrop-filter: blur(8px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }

        h1 {
            font-size: clamp(2.4rem, 8vw, 4.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #7bc9ff, #2f8eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px rgba(0, 160, 255, 0.3);
            margin: 0.5rem 0;
        }

        .sub {
            font-size: 0.9rem;
            color: #a0c4ff;
            border-top: 1px dashed rgba(100, 180, 255, 0.5);
            padding-top: 1rem;
            display: inline-flex;
            gap: 0.5rem;
        }

        .pill-stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(8, 20, 36, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(0, 200, 255, 0.3);
            font-family: monospace;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            gap: 1rem;
            pointer-events: none;
        }

        .pill-stats span:first-child {
            color: #6bc6ff;
        }

        .pill-stats span:last-child {
            color: #ffdf8c;
            font-size: 1.1rem;
        }

        /* quiz container – card design different from previous */
        .quiz-container {
            max-width: 780px;
            margin: 0 auto 80px auto;
            padding: 0 20px 40px 20px;
        }

        .quiz-card {
            background: rgba(12, 22, 35, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(72, 187, 255, 0.2);
            border-radius: 32px;
            margin-bottom: 28px;
            transition: transform 0.2s ease, box-shadow 0.2s;
            overflow: hidden;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.4);
        }

        .quiz-card:hover {
            border-color: rgba(0, 200, 255, 0.5);
            box-shadow: 0 18px 32px -12px rgba(0, 130, 200, 0.2);
        }

        .card-header {
            padding: 18px 24px 8px 24px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, rgba(0, 160, 255, 0.1), transparent);
            color: #7bcbff;
            border-bottom: 1px solid rgba(100, 180, 255, 0.2);
        }

        .question-text {
            padding: 16px 24px 12px 24px;
            font-size: 1.1rem;
            line-height: 1.5;
            font-weight: 500;
            color: #f0f9ff;
        }

        .options-area {
            padding: 8px 24px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opt {
            background: rgba(20, 35, 55, 0.7);
            border: 1px solid rgba(72, 187, 255, 0.25);
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #eef2ff;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 450;
        }

        .opt:active {
            transform: scale(0.97);
        }

        .opt-letter {
            font-weight: 700;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 150, 255, 0.2);
            border-radius: 40px;
            font-size: 0.8rem;
            color: #8aceff;
        }

        .opt.correct-answer {
            background: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.3);
        }

        .opt.wrong-answer {
            background: rgba(231, 76, 60, 0.2);
            border-color: #e74c3c;
        }

        .opt.disabled-opt {
            cursor: default;
            opacity: 0.9;
        }

        .emoji-feedback {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            z-index: 1000;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
            transition: opacity 0.1s;
        }

        .pop-emote {
            animation: emojiBlast 0.7s cubic-bezier(0.2, 1.2, 0.3, 1) forwards;
        }

        @keyframes emojiBlast {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            30% {
                opacity: 1;
                transform: translate(-50%, -60%) scale(1.4);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -90%) scale(1);
            }
        }

        /* scroll bar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #07121f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2f6f9f;
            border-radius: 10px;
        }

        /* responsive */
        @media (max-width: 550px) {
            .question-text {
                font-size: 1rem;
                padding: 12px 20px;
            }
            .options-area {
                padding: 6px 20px 20px 20px;
            }
            .opt {
                padding: 10px 14px;
                font-size: 0.85rem;
            }
            .pill-stats {
                bottom: 12px;
                left: 12px;
                padding: 0.3rem 1rem;
                font-size: 0.75rem;
            }
        }
        /* small touches */
        .status-badge {
            background: radial-gradient(ellipse at left, #0066aa20, transparent);
            border-radius: 32px;
            display: inline-block;
        }
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            color: #4f6f8f;
            border-top: 1px solid rgba(100, 150, 200, 0.2);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="mesh-bg"></div>
<div class="gradient-orb"></div>
<div class="gradient-orb gradient-orb-bottom"></div>

<div class="pill-stats">
    <span>SCORE ❤️</span>
    <span id="liveScore">0</span><span> / 28</span>
</div>

<header class="hero">
    <div class="badge-neon">al_witify</div>
    <h1>Head & Neck<br>Deep Dive</h1>
    <div class="sub">
        <span>💐💐</span>
        <span>🎧 haptic feedback</span>
    </div>
    <div style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.7;">▼ scroll to explore ▼</div>
</header>

<div class="quiz-container" id="quizRoot"></div>
<footer>by: al_witify</footer>

<!-- audio elements (same URLs) -->
<audio id="correctSound" preload="auto" src="https://www.myinstants.com/media/sounds/correct.mp3"></audio>
<audio id="wrongSound" preload="auto" src="https://www.myinstants.com/media/sounds/wrong.mp3"></audio>

<script>
    // ---------- EXACT ORIGINAL QUIZ DATA (28 questions, untouched) ----------
    const quizData = [
        { q: "1. What is the primary function of the orbicularis oculi muscle in relation to the eyelids?", options: ["a. To support the tarsal plates", "b. To raise the upper eyelid", "c. To close the eyelids", "d. To produce tears", "e. None of above"], correct: 2 },
        { q: "2. Which part of the eye is responsible for its avascular nature?", options: ["a. Iris", "b. Sclera", "c. Cornea", "d. Choroid", "e. Retina"], correct: 2 },
        { q: "3. Extra ocular muscles", options: ["a. all supply by abducent nerve.", "b. all originate from tendinous ring.", "c. superior oblique supply by trochlear nerve.", "d. lateral rectus supplied by oculomotor.", "e. none of above"], correct: 2 },
        { q: "4. Regarding oculomotor nerve", options: ["a. originate from medulla oblongata.", "b. have motor nuclei only.", "c. Supply all extra ocular muscles.", "d. pass in medial wall of cavernous sinus.", "e. all above are false"], correct: 4 },
        { q: "5. The nasal septum bony parts consist of:", options: ["a. the maxilla", "b. the vomer and ethmoid bones", "c. the sphenoid and ethmoid bones", "d. the frontal, zygoma and maxilla", "e. the vomer and palatine bones"], correct: 1 },
        { q: "6. Regarding the abducent nerve (CN V1):", options: ["a. the nucleus lies in the medulla", "b. supplies superior oblique muscle", "c. enters the orbit via superior orbital fissure", "d. has no relation to the cavernous sinus", "e. carries autonomic fibers from EdingerWestphal node"], correct: 2 },
        { q: "7. The larynx", options: ["a. Is a respiratory organ whose essential function is phonation", "b. Extends from the anterior upper border of the epiglottis to the level of C6", "c. Consists of two single cartilages, the thyroid and cricoid", "d. Is hauled up beneath the tongue with the epiglottis tilted anterior and upwards during swallowing", "e. Is supplied by the external laryngeal nerve except for the cricothyroid muscle which is supplied by the recurrent laryngeal nerve"], correct: 1 },
        { q: "8. external jugular vein (all true except)", options: ["a. forms by union of posterior division of retromandibular vein & posterior auricular vein", "b. its beginning lies in parotid gland", "c. end to subclavian vein", "d. descend inferoanteriorly", "e. b &c"], correct: 3 },
        { q: "9. platysma muscle", options: ["a. originated from body of mandible", "b. supplied by cervical branch of facial nerve", "c. supplied by cervical spinal roots", "d. skin overlying it supplied by cervical branch of facial nerve", "e. all of the above."], correct: 1 },
        { q: "10. digastric muscle", options: ["a. arise from body of mandible (anterior belly)", "b. anterior belly elevate larynx", "c. anterior belly supplied by trigeminal nerve", "d. all of above", "e. none of the above"], correct: 3 },
        { q: "11. mylohyoid muscle (choose false)", options: ["a. arise from mandibular body", "b. supplied by trigeminal nerve", "c. elevate body of mandible", "d. divide submandibular gland into superficial & deep parts", "e. all of the above"], correct: 2 },
        { q: "12. deep cervical fascia (choose false one)", options: ["a. carotid sheath contains one cranial nerve in its lower part", "b. carotid sheath contains 4 cranial nerves in its upper part", "c. carotid sheath contains deep cervical vessels", "d. contain maxillary artery", "e. all of the above."], correct: 3 },
        { q: "13. major border lines of neck triangles (all of following except)", options: ["a. trapezius muscle", "b. strap muscles", "c. sternocleidomastoid muscle", "d. omohyoid muscle", "e. a &b"], correct: 1 },
        { q: "14. anterior neck triangle contains except", options: ["a. stylohyoid muscle", "b. hypoglossal nerve", "c. submandibular gland", "d. brachial plexus", "e. all of the above."], correct: 3 },
        { q: "15. facial vein", options: ["a. facial veins joined by posterior division of retromandibular vein", "b. facial vein drained to external jugular vein", "c. facial vein connected with intracranial space", "d. facial vein cross over mandible without crossing over maxilla", "e. all of the above."], correct: 4 },
        { q: "16. maxillary vein (all true except)", options: ["a. one of two tributaries of retromandibular vein", "b. start in pterygopalatine fossa", "c. end in parotid gland", "d. forms from pterygoid plexus", "e. none of the above."], correct: 2 },
        { q: "17. internal jugular vein", options: ["a. has two bulbs & valves", "b. forms as continuation of superior petrosal sinus", "c. lies posterior to spinal accessory nerve in superior part of neck", "d. has 8 tributaries", "e. a &c"], correct: 4 },
        { q: "18. neck lymphatic system", options: ["a. retropharyngeal lymph nodes involute after age 5 years", "b. submandibular lymph nodes receive lymph from nose", "c. deep lymph nodes called jugular group", "d. all of above true", "e. none of the above"], correct: 4 },
        { q: "19. cancer in nasopharynx & neck lymph nodes", options: ["a. can cause posterior triangle lymphadenopathy", "b. start in lining of basisphenoid", "c. 1st involved lymph nodes are submandibular", "d. all of above true", "e. none of the above"], correct: 0 },
        { q: "20. autonomic neck & head nervous system", options: ["a. glossopharyngeal supply parasympathetic innervation of sublingual glands", "b. oculomotor supply sympathetic & motor innervation of eye", "c. vagus & sympathetic chain lie inside carotid sheath", "d. vagus is motor & parasympathetic nerve", "e. all of the above."], correct: 2 },
        { q: "21. deep neck spaces (all true except)", options: ["a. are potential spaces.", "b. danger space can transmit infections among mediastinum, retropharyngeal& skull base.", "c. parapharyngeal in not directly connected with submaxillary space.", "d. longest space is prevertebular space.", "e. all of the above."], correct: 2 },
        { q: "22. oral cavity", options: ["a. sensory nerve supply of it for larger proportion mediated by mandibular division of trigeminal nerve", "b. tongue muscles mainly supplied by facial artery", "c. foramen cecum play significant role in tasting of food", "d. all muscles of tongue supplied by same nerve", "e. none of the above"], correct: 0 },
        { q: "23. tensor palati muscle", options: ["a. inserted to Eustachian tube", "b. it is minor palatal muscle", "c. supplied by maxillary division of trigeminal nerve", "d. when contract open Eustachian tube", "e. a & d"], correct: 4 },
        { q: "24. palate", options: ["a. has 4 muscles", "b. palatine bone forms larger part of hard palate", "c. supplied by 9th, 10th as a whole", "d. uvular muscle has no role in swallowing & articulation", "e. none of the above"], correct: 2 },
        { q: "25. pharynx", options: ["a. palatine tonsil diseases cause jugulo- omohyoid lymph nodes enlargement", "b. palatoglossus forms posterior end of palatine tonsils", "c. palatoglossus share in oropharyngeal isthmus", "d. b & c", "e. all of the above."], correct: 2 },
        { q: "26. hypopharynx (choose false)", options: ["a. C6 vertebra represents end of it", "b. aryepiglottic folds forms lateral boundary", "c. consists of pyriform fossae & postcricoid regions", "d. valleculae are not part from it", "e. none of the above."], correct: 4 },
        { q: "27. superior constrictor muscle", options: ["a. arise from pharyngeal tubercle of occipital bone", "b. by its contraction propel bolus of food superiorly", "c. innervated by mandibular division of trigeminal nerve", "d. inserted to pharyngeal raphe", "e. c & d"], correct: 3 },
        { q: "28. salpingopharyngus muscle", options: ["a. elevates of Eustachian tube", "b. share in breathing", "c. blends with palatopharyngus", "d. supplied by trigeminal nerve", "e. a & b."], correct: 2 }
    ];

    // ---------- emoji + sound arrays (EXACT same as original style) ----------
    const emojisCorrect = ["🪿","❤️","🔥","❤️‍🔥","🫶","💯","💪","😍"];
    const emojisWrong = ["😑","🤦","💤","❌","💔","🦖","😂"];

    // state
    let currentScore = 0;
    const answeredStatus = new Array(quizData.length).fill(false);    // whether question answered
    const selectedChoice = new Array(quizData.length).fill(null);     // store selected option index per question

    // DOM elements
    const quizContainer = document.getElementById("quizRoot");
    const liveScoreSpan = document.getElementById("liveScore");

    // helper to play sound & emoji pop
    function triggerReaction(isCorrect) {
        // sound
        const audio = isCorrect ? document.getElementById("correctSound") : document.getElementById("wrongSound");
        if (audio) {
            audio.currentTime = 0;
            audio.play().catch(e => { /* silent fail for auto-policy */ });
        }
        // emoji layer
        const emojiDiv = document.createElement("div");
        emojiDiv.className = "emoji-feedback";
        const emojiArray = isCorrect ? emojisCorrect : emojisWrong;
        const randomEmoji = emojiArray[Math.floor(Math.random() * emojiArray.length)];
        emojiDiv.textContent = randomEmoji;
        document.body.appendChild(emojiDiv);
        emojiDiv.classList.add("pop-emote");
        setTimeout(() => {
            emojiDiv.remove();
        }, 700);
    }

    // update score UI
    function updateScoreUI() {
        liveScoreSpan.innerText = currentScore;
    }

    // handle answer selection
    function handleAnswer(qIndex, optIndex) {
        if (answeredStatus[qIndex]) return;  // already answered

        const question = quizData[qIndex];
        const isCorrect = (optIndex === question.correct);
        
        // mark answered
        answeredStatus[qIndex] = true;
        selectedChoice[qIndex] = optIndex;
        
        if (isCorrect) {
            currentScore++;
            updateScoreUI();
            triggerReaction(true);
        } else {
            triggerReaction(false);
        }
        
        // re-render this specific card (to show correct/wrong and disable further clicks)
        renderSingleCard(qIndex);
    }
    
    // render one card with visual feedback
    function renderSingleCard(idx) {
        const q = quizData[idx];
        const alreadyAnswered = answeredStatus[idx];
        const userChoice = selectedChoice[idx];
        const correctIdx = q.correct;
        
        const cardDiv = document.createElement("div");
        cardDiv.className = "quiz-card";
        cardDiv.setAttribute("data-qid", idx);
        
        // header
        const header = document.createElement("div");
        header.className = "card-header";
        header.innerText = `question ${idx+1}`;
        cardDiv.appendChild(header);
        
        // question text
        const qTextDiv = document.createElement("div");
        qTextDiv.className = "question-text";
        qTextDiv.innerText = q.q;
        cardDiv.appendChild(qTextDiv);
        
        // options area
        const optionsArea = document.createElement("div");
        optionsArea.className = "options-area";
        
        q.options.forEach((opt, optIndex) => {
            const optBtn = document.createElement("div");
            optBtn.className = "opt";
            
            // letter indicator
            const letterSpan = document.createElement("span");
            letterSpan.className = "opt-letter";
            letterSpan.innerText = String.fromCharCode(65 + optIndex); // A,B,C...
            optBtn.appendChild(letterSpan);
            
            const textSpan = document.createElement("span");
            textSpan.innerText = opt;
            optBtn.appendChild(textSpan);
            
            // if answered, apply styles and disable click
            if (alreadyAnswered) {
                optBtn.classList.add("disabled-opt");
                if (optIndex === correctIdx) {
                    optBtn.classList.add("correct-answer");
                } else if (optIndex === userChoice && optIndex !== correctIdx) {
                    optBtn.classList.add("wrong-answer");
                }
                // no event listener
            } else {
                optBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    handleAnswer(idx, optIndex);
                });
            }
            optionsArea.appendChild(optBtn);
        });
        cardDiv.appendChild(optionsArea);
        
        // replace existing card if any
        const oldCard = document.querySelector(`.quiz-card[data-qid='${idx}']`);
        if (oldCard) {
            oldCard.replaceWith(cardDiv);
        } else {
            // should not happen during initial render, but for safety
            quizContainer.appendChild(cardDiv);
        }
    }
    
    // full initial render (all cards in order)
    function renderAllCards() {
        quizContainer.innerHTML = "";
        for (let i = 0; i < quizData.length; i++) {
            const q = quizData[i];
            const cardDiv = document.createElement("div");
            cardDiv.className = "quiz-card";
            cardDiv.setAttribute("data-qid", i);
            
            const header = document.createElement("div");
            header.className = "card-header";
            header.innerText = `question ${i+1}`;
            cardDiv.appendChild(header);
            
            const qTextDiv = document.createElement("div");
            qTextDiv.className = "question-text";
            qTextDiv.innerText = q.q;
            cardDiv.appendChild(qTextDiv);
            
            const optionsArea = document.createElement("div");
            optionsArea.className = "options-area";
            
            q.options.forEach((opt, optIndex) => {
                const optBtn = document.createElement("div");
                optBtn.className = "opt";
                
                const letterSpan = document.createElement("span");
                letterSpan.className = "opt-letter";
                letterSpan.innerText = String.fromCharCode(65 + optIndex);
                optBtn.appendChild(letterSpan);
                
                const textSpan = document.createElement("span");
                textSpan.innerText = opt;
                optBtn.appendChild(textSpan);
                
                // if previously answered (from storage persistence? we reset every session but we keep state)
                const already = answeredStatus[i];
                if (already) {
                    optBtn.classList.add("disabled-opt");
                    if (optIndex === q.correct) {
                        optBtn.classList.add("correct-answer");
                    } else if (optIndex === selectedChoice[i] && optIndex !== q.correct) {
                        optBtn.classList.add("wrong-answer");
                    }
                } else {
                    optBtn.addEventListener("click", (e) => {
                        e.preventDefault();
                        handleAnswer(i, optIndex);
                    });
                }
                optionsArea.appendChild(optBtn);
            });
            cardDiv.appendChild(optionsArea);
            quizContainer.appendChild(cardDiv);
        }
    }
    
    // extra: unlock audio on first touch for telegram / mobile
    function unlockAudioOnFirstTouch() {
        const unlock = () => {
            const correctAudio = document.getElementById("correctSound");
            const wrongAudio = document.getElementById("wrongSound");
            if (correctAudio) correctAudio.load();
            if (wrongAudio) wrongAudio.load();
            document.removeEventListener("touchstart", unlock);
            document.removeEventListener("click", unlock);
        };
        document.addEventListener("touchstart", unlock, { once: true });
        document.addEventListener("click", unlock, { once: true });
    }
    
    // initialization
    function init() {
        // reset state (fresh start)
        for (let i = 0; i < quizData.length; i++) {
            answeredStatus[i] = false;
            selectedChoice[i] = null;
        }
        currentScore = 0;
        updateScoreUI();
        renderAllCards();
        unlockAudioOnFirstTouch();
    }
    
    init();
</script>
</body>
</html>
